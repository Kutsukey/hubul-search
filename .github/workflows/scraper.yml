name: Hubul Otonom Tarayıcı

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: Python Ortamını Hazırla
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gerekli Kütüphaneleri Yükle (Requirements)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Playwright Tarayıcısını Kur
        run: |
          playwright install chromium

      - name: Hubul Crawler'ı Çalıştır
        run: |
          python crawler/hybrid_hacettepe_crawler_3.py

      - name: Yeni Verileri Repoya Pushla (Auto-Commit)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add public/outputs/*.json
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: weekly hubul data update" && git push)
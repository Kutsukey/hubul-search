name: Hubul Günlük Duyuru Güncellemesi

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-announcements:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Bağımlılıkları Kur
        run: |
          pip install -r requirements.txt
          playwright install chromium
      - name: Sadece Duyuruları Çek
        run: python crawler/announcement_pinger.py
      - name: Güncelle ve Pushla
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/outputs/announcements_live.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: daily announcement update" && git push)
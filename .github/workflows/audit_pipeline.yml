name: Hubul Autonomous Pipeline

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch: 

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Depoyu Çek
        uses: actions/checkout@v3

      - name: 2. Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 3. Bağımlılıkları Kur
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: 4. Keşif & Gatekeeper (Yeni siteleri bul ve onayla)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python utils/auto_gatekeeper.py

      - name: 5. Deep Crawler (Sadece Seed Listesini Tara)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python crawler/hybrid_hacettepe_crawler_3.py

      - name: 6. Veri Temizleyici & Puanlayıcı (Jilet)
        run: python utils/veri_temizleyici.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Otonom Crawler: Güncel Veriler Çekildi" || echo "Değişiklik yok"
          git pull origin main --rebase
          git push origin main

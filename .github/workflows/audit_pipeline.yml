name: Hubul Autonomous Pipeline

on:
  schedule:
    # Her Pazartesi UTC ile 00:00 (Türkiye saati ile Pazar'ı Pazartesi'ye bağlayan gece 03:00)
    - cron: "0 0 * * 1"
  workflow_dispatch: # Manuel tetikleme butonu

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Depoyu Çek
        uses: actions/checkout@v3

      - name: 2. Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 3. Bağımlılıkları Kur
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: 4. Keşif & Gatekeeper (Yeni siteleri bul ve onayla)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        # Eğer yeni siteleri bulan ayrı bir scriptin varsa önce o çalışmalı, sonra gatekeeper
        run: python utils/auto_gatekeeper.py

      - name: 5. Deep Crawler (Sadece Seed Listesini Tara)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python crawler/hybrid_hacettepe_crawler_3.py

      - name: 6. Veri Temizleyici & Puanlayıcı (Jilet)
        run: python utils/veri_temizleyici.py

      - name: 7. Değişiklikleri Pushla
        run: |
          git config --global user.name "Hubul Bot"
          git config --global user.email "bot@hubul.com"
          git add inputs/ public/outputs/
          # Değişiklik yoksa hata vermemesi için || true eklendi
          git commit -m "🤖 [Otonom] Pazar Gece Mesaisi: Yeni siteler eklendi, veri temizlendi" || true
          git push origin dev
